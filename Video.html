<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator Studio (Mock-up)</title>
    <style>
        /* --- Basic Styling --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 25px;
        }

        /* --- Tabs Styling --- */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab-button {
            padding: 15px 25px;
            cursor: pointer;
            background-color: #f9f9f9;
            border: none;
            border-radius: 8px 8px 0 0;
            margin-right: 5px;
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
        }

        .tab-button.active {
            background-color: #007bff;
            color: white;
        }

        .tab-content {
            display: none;
            padding: 20px 0;
        }

        .tab-content.active {
            display: block;
        }

        /* --- Form Elements Styling --- */
        .input-group {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fefefe;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"], textarea, select {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            resize: vertical;
        }

        input[type="file"] {
            padding: 10px 0;
        }

        button.generate-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        button.generate-btn:hover {
            background-color: #218838;
        }

        /* --- Video Output/Placeholder --- */
        .output-section {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #007bff;
            border-radius: 10px;
            text-align: center;
            background-color: #e9f7ff;
        }

        .output-section p {
            font-style: italic;
            color: #007bff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ AI Video Generator Studio (Mock-up)</h1>

        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'PromptToVideo')">Prompt to Video</button>
            <button class="tab-button" onclick="openTab(event, 'ImageToVideo')">Image to Video</button>
        </div>

        <div id="PromptToVideo" class="tab-content active">
            <h2>Generate from Text Prompt</h2>
            <div class="input-group">
                <label for="prompt-input">Video Description Prompt:</label>
                <textarea id="prompt-input" rows="4" placeholder="e.g., A majestic dragon flying over a medieval castle at sunset, highly detailed, cinematic lighting."></textarea>
            </div>

            <div class="input-group">
                <label for="video-style">Video Style/Aesthetics:</label>
                <select id="video-style">
                    <option value="cinematic">Cinematic</option>
                    <option value="anime">Anime/Cartoon</option>
                    <option value="photorealistic">Photorealistic</option>
                    <option value="lowpoly">Low Poly/Stylized</option>
                </select>
            </div>
            
            <h3>🎬 Camera Movements Options</h3>
            <div class="input-group">
                <label for="camera-movement">Select Camera Movement:</label>
                <select id="camera-movement">
                    <option value="none">None (Static Shot)</option>
                    <option value="pan-left">Pan Left</option>
                    <option value="dolly-in">Dolly In (Zoom In)</option>
                    <option value="crane-shot">Crane Shot (Ascending View)</option>
                    <option value="orbit">360° Orbit</option>
                </select>
            </div>

        </div>

        <div id="ImageToVideo" class="tab-content">
            <h2>Animate from Still Image</h2>
            <div class="input-group">
                <label for="image-upload">Upload Base Image:</label>
                <input type="file" id="image-upload" accept="image/*">
            </div>

            <div class="input-group">
                <label for="motion-prompt">Desired Motion Prompt (Optional):</label>
                <textarea id="motion-prompt" rows="2" placeholder="e.g., Make the water in the image ripple gently and the clouds drift."></textarea>
            </div>

            <h3>🎬 Camera Movements Options</h3>
            <div class="input-group">
                <label for="camera-movement-img">Select Camera Movement:</label>
                <select id="camera-movement-img">
                    <option value="none">None (Subtle Animation)</option>
                    <option value="tilt-up">Tilt Up</option>
                    <option value="push-in">Push In (Slow Zoom)</option>
                    <option value="lateral-slide">Lateral Slide</option>
                </select>
            </div>
        </div>

        <button class="generate-btn" onclick="alert('MOCK-UP: Video generation started! (Requires a powerful AI backend to be functional)')">
            🚀 Generate Video (10 Seconds)
        </button>

        <div class="output-section">
            <h3>Video Output</h3>
            <p>Your generated video will appear here.</p>
            <div style="width: 100%; height: 300px; background-color: #ccf; border-radius: 8px; margin-top: 15px;">
                </div>
            <p style="margin-top: 10px;">(Note: This is a placeholder. Real functionality requires a custom, dedicated AI server and API.)</p>
        </div>

    </div>

    <script>
        // --- JavaScript for Tab Switching (Frontend Only) ---
        function openTab(evt, tabName) {
            // Declare all variables
            var i, tabcontent, tablinks;

            // Get all elements with class="tab-content" and hide them
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }

            // Get all elements with class="tab-button" and remove the class "active"
            tablinks = document.getElementsByClassName("tab-button");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            // Show the current tab, and add an "active" class to the button that opened the tab
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        // Set the default active tab on load
        document.addEventListener('DOMContentLoaded', () => {
            // Explicitly trigger the click on the first button to ensure active state is correct
            document.querySelector('.tab-button').click();
        });
    </script>

</body>
</html>
